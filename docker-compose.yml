version: "3"

networks:
  kafka-net:
    driver: bridge

services:
  # KAFKA SETUP FOR STREAM PROCESSING
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    #  - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:19092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      #Prevent data loss die to broker dying (replicate to multiple brokers and keep in sync)
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1 #3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1 #single node cluster fix
      #Prevent log cleanup for seed reconstruction
      KAFKA_LOG_RETENTION_BYTES: -1
      KAFKA_LOG_RETENTION_MS: -1
      KAFKA_LOG_CLEANER_ENABLE: "false"
      KAFKA_DELETE_TOPIC_ENABLE: "true" #force-enable topic deletion (useful for debugging topic offsets)
      KAFKA_AUTO_OFFSET_RESET: "earliest" # read from the first message of the topic if the group has no committed offsets yet
    networks:
      - kafka-net
    volumes:
      - ../docker-volumes/kafka-data:/var/lib/kafka/data

  init_kafka:
    image: apache/kafka:latest
    depends_on:
      - kafka
    volumes:
      - ./scripts/tests/misc/init_kafka.sh:/scripts/init_kafka.sh:ro
    entrypoint: ["bash", "/scripts/init_kafka.sh"]
    env_file:
      - .env
    restart: "no"
    networks:
      - kafka-net

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    environment:
      - MINIO_ROOT_USER=test
      - MINIO_ROOT_PASSWORD=testtest
      - MINIO_DEFAULT_BUCKETS=default_bucket
    networks:
      - kafka-net
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ../docker-volumes/minio-data:/data
    command: server /data --console-address ":9001"

  seeds:
    build:
      context: ./services/seeds/
      dockerfile: Dockerfile
    #container_name: seeds
    networks:
      - kafka-net
    env_file:
      - .env
    volumes:
      - ../docker-volumes/seed-restore:/seed

  scenes:
    build:
      context: ./services/scenes/
      dockerfile: Dockerfile
    #container_name: scenes
    networks:
      - kafka-net
    env_file:
      - .env

  qcsc:
    build:
      context: ./services/qcsc/
      dockerfile: Dockerfile
    networks:
      - kafka-net
    env_file:
      - .env

  lidar:
    build:
      context: ./services/lidar/
      dockerfile: Dockerfile
    #container_name: lidar
    networks:
      - kafka-net
    env_file:
      - .env

  qcpc:
    build:
      context: ./services/qcpc/
      dockerfile: Dockerfile
    networks:
      - kafka-net
    env_file:
      - .env
